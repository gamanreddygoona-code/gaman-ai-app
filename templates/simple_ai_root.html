<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple AI Model — Local Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --border: #475569;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --user-bubble: #1e293b;
            --bot-bubble: #0f172a;
            --success: #10b981;
            --error: #ef4444;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #93c5fd);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-primary), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
        }

        /* ── Chat Area ──────────────────────────────────── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 16px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 4px;
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .welcome p {
            color: var(--text-secondary);
            max-width: 420px;
            line-height: 1.7;
            font-size: 14px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
        }

        .suggestion {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
            background: rgba(59, 130, 246, 0.08);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: var(--user-bubble);
            border: 1px solid var(--border);
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, var(--accent), #93c5fd);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.7;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }

        .message.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .bubble code {
            background: rgba(59, 130, 246, 0.12);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--accent-hover);
        }

        .bubble strong {
            color: var(--accent-hover); 
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ── Input Area ─────────────────────────────────── */
        .input-area {
            padding: 16px 28px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 150px;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        .input-box::placeholder {
            color: var(--text-muted);
        }

        .input-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #93c5fd);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .chat-container { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .suggestions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <!-- ── HEADER ──────────────────────────────────── -->
    <header class="header">
        <div class="header-left">
            <div class="logo">S</div>
            <div>
                <div class="header-title">Simple AI Chat</div>
                <div class="header-subtitle">Local Linear Regression Model</div>
            </div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            Running locally port 8001
        </div>
    </header>

    <!-- ── CHAT ────────────────────────────────────── -->
    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">📈</div>
            <h2>Simple Regression AI</h2>
            <p>I predict new values based on 3 input features. I was trained locally with scikit-learn.</p>
            <div class="suggestions">
                <div class="suggestion" onclick="useSuggestion(this)">Predict 2.5, 2.0, 3.0</div>
                <div class="suggestion" onclick="useSuggestion(this)">What is 1.0, 1.0, 1.0?</div>
                <div class="suggestion" onclick="useSuggestion(this)">Predict 4.5 3.5 5.0</div>
            </div>
        </div>
    </div>

    <!-- ── INPUT ───────────────────────────────────── -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                class="input-box"
                id="userInput"
                placeholder="Give me 3 numbers (e.g. Predict 2.5 2.0 3.0)"
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
                ➤
            </button>
        </div>
        <div class="input-hint">Press <strong>Enter</strong> to send · <strong>Shift+Enter</strong> for new line</div>
    </div>

    <script>
        const chatContainer = document.getElementById("chatContainer");
        const userInput     = document.getElementById("userInput");
        const sendBtn       = document.getElementById("sendBtn");
        const welcome       = document.getElementById("welcome");

        let isWaiting = false;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isWaiting) return;

            if (welcome) welcome.style.display = "none";

            appendMessage("user", text);
            userInput.value = "";
            autoResize(userInput);

            isWaiting = true;
            sendBtn.disabled = true;

            const typingEl = showTyping();

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text }),
                });

                const data = await res.json();

                typingEl.remove();

                if (res.ok) {
                    appendMessage("bot", data.reply);
                } else {
                    appendMessage("bot", "⚠️ Error: " + (data.error || "Something went wrong."));
                }
            } catch (err) {
                typingEl.remove();
                appendMessage("bot", "⚠️ Could not reach the server.");
                console.error(err);
            }

            isWaiting = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = role === "user" ? "👤" : "📈";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            
            // Allow basic bold syntax
            let safe = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

            bubble.innerHTML = safe;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);

            scrollToBottom();
        }

        function showTyping() {
            const wrapper = document.createElement("div");
            wrapper.className = "message bot";

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = "📈";

            const indicator = document.createElement("div");
            indicator.className = "typing-indicator";
            indicator.innerHTML = "<span></span><span></span><span></span>";

            wrapper.appendChild(avatar);
            wrapper.appendChild(indicator);
            chatContainer.appendChild(wrapper);

            scrollToBottom();
            return wrapper;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        function handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 150) + "px";
        }

        function useSuggestion(el) {
            userInput.value = el.textContent;
            userInput.focus();
            sendMessage();
        }
    </script>
</body>
</html>
