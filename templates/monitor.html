<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaman AI — Database Neural Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d15;
            --border: #1a1a26;
            --accent: #00ff88;
            --text: #e0e0f0;
            --muted: #666680;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            font-weight: 700;
        }

        .stat-val {
            font-size: 48px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--accent);
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .file-path { color: var(--accent); }
        .file-size { color: var(--muted); }

        .log-stream {
            grid-column: span 2;
            background: #000;
            border-radius: 12px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #00ff41;
            line-height: 1.5;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="pulse"></div>
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">DATABASE NEURAL MONITOR</h2>
        </div>
        <div style="color: var(--muted); font-size: 12px;">SYSTEM STATUS: <span style="color: var(--accent);">STABLE</span></div>
    </header>

    <div class="container">
        <!-- Knowledge Stats -->
        <div class="card">
            <div class="card-title">Cognitive Load (Rows)</div>
            <div class="stat-val" id="row-count">0</div>
            <div style="font-size: 12px; color: var(--muted);">Total learned facts and research entries.</div>
        </div>

        <!-- Disk Stats -->
        <div class="card">
            <div class="card-title">Disk Occupancy</div>
            <div class="stat-val" id="disk-size">0 MB</div>
            <div style="font-size: 12px; color: var(--muted);">Total storage used across all database shards.</div>
        </div>

        <!-- File Locations -->
        <div class="card" style="grid-column: span 2;">
            <div class="card-title">Active Database Shards & Storage Paths</div>
            <ul class="file-list" id="file-list">
                <!-- Populated via JS -->
            </ul>
        </div>

        <!-- Live Neural Stream -->
        <div class="log-stream" id="log-stream">
            [SYSTEM] Neural monitor initialized...<br>
            [SYSTEM] Scanning storage controllers...<br>
        </div>
    </div>

    <script>
        async function updateMonitor() {
            try {
                const res = await fetch('/api/db/stats');
                const data = await res.json();

                document.getElementById('row-count').textContent = data.total_rows.toLocaleString();
                document.getElementById('disk-size').textContent = (data.total_bytes / (1024 * 1024)).toFixed(2) + ' MB';

                const list = document.getElementById('file-list');
                list.innerHTML = '';
                data.files.forEach(f => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <span class="file-path">${f.name}</span>
                        <span class="file-size">${(f.size / (1024 * 1024)).toFixed(2)} MB</span>
                    `;
                    list.appendChild(li);
                });

                const log = document.getElementById('log-stream');
                const time = new Date().toLocaleTimeString();
                log.innerHTML += `[${time}] Heartbeat: ${data.total_rows} facts indexed. Storage: ${data.files.length} shards active.<br>`;
                log.scrollTop = log.scrollHeight;

            } catch(e) {
                console.error("Monitor sync failed", e);
            }
        }

        setInterval(updateMonitor, 3000);
        updateMonitor();
    </script>
</body>
</html>
